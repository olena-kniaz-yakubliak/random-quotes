<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Quotes</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Random Quotes</h1>
      <p id="quote" class="quote">
        <em> Click the button to generate random quote</em>
      </p>
      <p id="author"></p>
      <button id="generate-btn" class="btn">Generate Quote</button>
      <i id="favorite-btn" class="far fa-star star-icon" aria-hidden="true"></i>
      <!-- <button id="favorite-btn" class="btn">Add to Favorites</button> -->
      <!-- <span id="favorite-btn" class="star-icon"></span> -->
    </div>
    <div id="favorites-container" class="favorites-container">
      <!-- Favorite quotes will be dinamically added here -->
    </div>

    <script src="index.js" type="module"></script>
  </body>
</html>
